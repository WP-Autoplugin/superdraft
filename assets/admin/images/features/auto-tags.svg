<svg class="sd-feature-svg sd-feature-auto-tags" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="100%" height="100%" style="background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
  <style>
    /* Base Skeleton Styles */
    .sd-feature-auto-tags .skeleton-title { fill: #9ca3af; rx: 4px; }
    .sd-feature-auto-tags .skeleton-static { fill: #e5e7eb; rx: 4px; }
    .sd-feature-auto-tags .divider { fill: #f3f4f6; rx: 1px; }
    
    /* Tag and Halo Styles */
    .sd-feature-auto-tags .pop-halo { fill: none; stroke: #3b82f6; stroke-width: 1.5; rx: 11px; opacity: 0; }
    .sd-feature-auto-tags .tag-inner { fill: #ffffff; }

    /* --- ANIMATION TIMELINE (6 Second Loop) --- */

    /* Tag 1 Animations (Triggers at 15%) */
    @keyframes sd-auto-tags-tag1-visibility {
      0%, 14%   { opacity: 0; transform: translateY(5px); }
      15%, 85%  { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes sd-auto-tags-tag1-color {
      0%, 15%   { fill: #3b82f6; } /* Pops in bright blue */
      20%, 100% { fill: #d1d5db; } /* Settles to neutral gray */
    }
    @keyframes sd-auto-tags-halo1-pulse {
      0%, 14%   { opacity: 0; transform: scale(0.8); }
      15%       { opacity: 0.8; transform: scale(0.8); }
      22%       { opacity: 0; transform: scale(1.3); }
      23%, 100% { opacity: 0; }
    }

    /* Tag 2 Animations (Triggers at 30%) */
    @keyframes sd-auto-tags-tag2-visibility {
      0%, 29%   { opacity: 0; transform: translateY(5px); }
      30%, 85%  { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes sd-auto-tags-tag2-color {
      0%, 30%   { fill: #3b82f6; }
      35%, 100% { fill: #d1d5db; }
    }
    @keyframes sd-auto-tags-halo2-pulse {
      0%, 29%   { opacity: 0; transform: scale(0.8); }
      30%       { opacity: 0.8; transform: scale(0.8); }
      37%       { opacity: 0; transform: scale(1.3); }
      38%, 100% { opacity: 0; }
    }

    /* Tag 3 Animations (Triggers at 45%) */
    @keyframes sd-auto-tags-tag3-visibility {
      0%, 44%   { opacity: 0; transform: translateY(5px); }
      45%, 85%  { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes sd-auto-tags-tag3-color {
      0%, 45%   { fill: #3b82f6; }
      50%, 100% { fill: #d1d5db; }
    }
    @keyframes sd-auto-tags-halo3-pulse {
      0%, 44%   { opacity: 0; transform: scale(0.8); }
      45%       { opacity: 0.8; transform: scale(0.8); }
      52%       { opacity: 0; transform: scale(1.3); }
      53%, 100% { opacity: 0; }
    }

    /* Apply classes */
    .sd-feature-auto-tags .anim-tag1-vis { animation: sd-auto-tags-tag1-visibility 6s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .sd-feature-auto-tags .anim-tag1-col { animation: sd-auto-tags-tag1-color 6s infinite ease-out; }
    .sd-feature-auto-tags .anim-halo1    { animation: sd-auto-tags-halo1-pulse 6s infinite ease-out; transform-origin: 57.5px 176px; }

    .sd-feature-auto-tags .anim-tag2-vis { animation: sd-auto-tags-tag2-visibility 6s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .sd-feature-auto-tags .anim-tag2-col { animation: sd-auto-tags-tag2-color 6s infinite ease-out; }
    .sd-feature-auto-tags .anim-halo2    { animation: sd-auto-tags-halo2-pulse 6s infinite ease-out; transform-origin: 140px 176px; }

    .sd-feature-auto-tags .anim-tag3-vis { animation: sd-auto-tags-tag3-visibility 6s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .sd-feature-auto-tags .anim-tag3-col { animation: sd-auto-tags-tag3-color 6s infinite ease-out; }
    .sd-feature-auto-tags .anim-halo3    { animation: sd-auto-tags-halo3-pulse 6s infinite ease-out; transform-origin: 220px 176px; }
  </style>

  <g id="window-header">
    <circle cx="25" cy="22" r="4" fill="#ef4444" opacity="0.7"/>
    <circle cx="39" cy="22" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="53" cy="22" r="4" fill="#10b981" opacity="0.7"/>
  </g>

  <g id="post-body">
    <rect x="25" y="55" width="220" height="14" class="skeleton-title" />
    
    <rect x="25" y="85" width="350" height="10" class="skeleton-static" />
    <rect x="25" y="105" width="310" height="10" class="skeleton-static" />
    <rect x="25" y="125" width="260" height="10" class="skeleton-static" />

    <rect x="25" y="150" width="350" height="2" class="divider" />
  </g>

  <g id="ai-tags">
    
    <g class="anim-tag1-vis">
      <rect x="25" y="165" width="65" height="22" class="pop-halo anim-halo1" />
      <rect x="25" y="165" width="65" height="22" rx="11" class="anim-tag1-col" />
      <circle cx="34" cy="176" r="3.5" class="tag-inner" />
      <rect x="44" y="174" width="35" height="4" rx="2" class="tag-inner" opacity="0.7" />
    </g>

    <g class="anim-tag2-vis">
      <rect x="100" y="165" width="80" height="22" class="pop-halo anim-halo2" />
      <rect x="100" y="165" width="80" height="22" rx="11" class="anim-tag2-col" />
      <circle cx="109" cy="176" r="3.5" class="tag-inner" />
      <rect x="119" y="174" width="50" height="4" rx="2" class="tag-inner" opacity="0.7" />
    </g>

    <g class="anim-tag3-vis">
      <rect x="190" y="165" width="60" height="22" class="pop-halo anim-halo3" />
      <rect x="190" y="165" width="60" height="22" rx="11" class="anim-tag3-col" />
      <circle cx="199" cy="176" r="3.5" class="tag-inner" />
      <rect x="209" y="174" width="30" height="4" rx="2" class="tag-inner" opacity="0.7" />
    </g>

  </g>
</svg>
