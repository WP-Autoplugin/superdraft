<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="100%" height="100%" style="background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
  <style>
    /* Base Skeleton Styles */
    .skeleton-bg { fill: #f9fafb; }
    .skeleton-static { fill: #e5e7eb; rx: 4px; }
    .skeleton-text { fill: #9ca3af; rx: 4px; }
    .skeleton-suggest { fill: #d1d5db; rx: 4px; }
    .caret { stroke: #3b82f6; stroke-width: 2; stroke-linecap: round; }
    
    /* New: The 'Pop' Halo effect */
    .pop-halo { fill: none; stroke: #3b82f6; stroke-width: 1.5; rx: 6px; opacity: 0; }

    /* --- ANIMATION TIMELINE (4.5 Second Loop) --- */
    
    /* 1. Active Text Typing & Expansion */
    @keyframes type-sequence {
      0%, 10%   { width: 45px; fill: #9ca3af; }  /* Initial state */
      35%, 65%  { width: 125px; fill: #9ca3af; } /* User types and pauses */
      67%       { fill: #3b82f6; }               /* FLASH: Bright blue at instant of 'Tab' */
      72%, 92%  { width: 215px; fill: #9ca3af; } /* Returns to normal, suggestion absorbed */
      98%, 100% { width: 45px; }                /* Reset phase */
    }

    /* 2. Caret Movement tracking the text edge */
    @keyframes caret-move {
      0%, 10%   { transform: translateX(45px); }
      35%, 65%  { transform: translateX(125px); }
      72%, 92%  { transform: translateX(215px); }
      98%, 100% { transform: translateX(45px); }
    }

    /* 3. Caret Blinking Effect */
    @keyframes caret-blink {
      0%, 49%   { opacity: 1; }
      50%, 99%  { opacity: 0; }
    }

    /* 4. Smart Suggestion Behavior (Unchanged) */
    @keyframes suggestion-behavior {
      0%, 39%   { opacity: 0; }    /* Hidden while typing */
      42%, 65%  { opacity: 0.45; } /* AI Suggestion pops up faintly */
      67%, 100% { opacity: 0; }    /* Vanishes instantly when accepted */
    }

    /* 5. NEW: The Halo Pulse (Visualizing the 'Accept' action) */
    @keyframes pop-pulse {
      0%, 65%   { opacity: 0; transform: scale(0.6); } /* Hidden, pre-scaled down */
      66%       { opacity: 0.8; transform: scale(0.6); } /* Instant trigger */
      72%       { opacity: 0; transform: scale(1.1); }   /* Scale up and fade out quickly */
      100%      { opacity: 0; }
    }

    /* Apply classes to elements */
    .anim-text { animation: type-sequence 4.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .anim-caret { animation: caret-move 4.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .anim-blink { animation: caret-blink 0.8s infinite; }
    .anim-suggest { animation: suggestion-behavior 4.5s infinite ease-in-out; }
    .anim-halo { animation: pop-pulse 4.5s infinite ease-out; transform-origin: 215px 115px; } /* Pulse centered on new caret pos */
  </style>

  <g id="window-header">
    <circle cx="25" cy="22" r="4" fill="#ef4444" opacity="0.7"/>
    <circle cx="39" cy="22" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="53" cy="22" r="4" fill="#10b981" opacity="0.7"/>
  </g>

  <g id="skeleton-body">
    <rect x="25" y="55" width="350" height="10" class="skeleton-static" />
    <rect x="25" y="80" width="280" height="10" class="skeleton-static" />

    <rect x="25" y="110" height="10" class="skeleton-text anim-text" />

    <rect x="155" y="110" width="85" height="10" class="skeleton-suggest anim-suggest" />

    <rect x="195" y="105" width="40" height="20" class="pop-halo anim-halo" />

    <g class="anim-caret">
      <line x1="28" y1="107" x2="28" y2="123" class="caret anim-blink" />
    </g>

    <rect x="25" y="140" width="190" height="10" class="skeleton-static" />
  </g>
</svg>
